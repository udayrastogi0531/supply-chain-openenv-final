openenv:
  name: supply-chain-env
  version: 0.1.0
  description: OpenEnv-compatible supply chain inventory management environment
  framework: fastapi
  entrypoint: server.app:app
  tasks:
    - name: easy
      description: Stable demand, low variability
    - name: medium
      description: Seasonal demand with moderate variability
    - name: hard
      description: Noisy demand with disruptions and delayed supply
  action_space:
    type: box
    dtype: float32
    shape: [3]
    low: [0.0, 0.0, 0.0]
    high: [100.0, 100.0, 100.0]
    description: Non-negative order quantity for each of 3 products
  observation_space:
    type: dict
    fields:
      inventory:
        type: box
        dtype: float32
        shape: [3]
      time:
        type: discrete
        n: 365
      demand_history:
        type: box
        dtype: float32
        shape: [10, 3]
      weather:
        type: box
        dtype: float32
        shape: [1]
      promotion:
        type: box
        dtype: float32
        shape: [1]
      sustainability_score:
        type: box
        dtype: float32
        shape: [1]
  reward_function:
    description: Profit with ordering, holding, stockout, and sustainability adjustments
  api:
    base_path: /
    endpoints:
      reset: /reset
      step: /step
      state: /state
      tasks: /tasks
      baseline: /baseline
      grader: /grader